name: Build GUI RPG Background Generator

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow perlin-noise pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --noconsole --onefile bg_gui.py
      - name: List dist folder
        run: dir dist

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpg-background-gui
          path: dist/bg_gui.exe
